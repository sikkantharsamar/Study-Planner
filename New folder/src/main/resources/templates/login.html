<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
<div class="shape shape-a"></div>
<div class="shape shape-b"></div>
<main class="auth-card">
    <h1>Study Planner</h1>
    <p>Plan sessions, track deadlines, and stay consistent.</p>

    <form method="post" th:action="@{/login}" class="auth-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Sign in</button>
    </form>

    <p class="hint">Default login: student / study123</p>

    <p class="error" th:if="${param.error}">Invalid credentials. Please try again.</p>
    <p class="status" th:if="${param.logout}">You have been logged out.</p>
</main>
</body>
</html>
